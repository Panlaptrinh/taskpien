<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Task PN</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { slate: { 750: '#293548' } } } }
        }
    </script>
    
    <style>
        /* CSS Tối ưu cho Mobile App */
        body { background-color: #020617; color: white; margin: 0; overflow: hidden; overscroll-behavior-y: none; -webkit-font-smoothing: antialiased; }
        .app-container { -webkit-tap-highlight-color: transparent; user-select: none; }
        .custom-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        input, select, textarea { user-select: text; }
        
        /* Hiệu ứng mượt mà */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <!-- Sử dụng Import Map để load React và Lucide Icons trực tiếp trên trình duyệt -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0"
        }
    }
    </script>
    
    <!-- Trình biên dịch Babel để chạy JSX trực tiếp -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Layout, CalendarDays, CheckCircle2, Clock, Plus, Search, Bell, LogOut, 
            FileText, Printer, User, X, AlertCircle, Trash2, ChevronDown, 
            Calendar as CalendarIcon, Briefcase, Home, ArrowRight, Circle, 
            ChevronRight, ChevronLeft, ChevronDown as ChevronDownIcon, FolderOpen,
            Edit2, Trash, Users, Timer, Play, Pause, RotateCcw, Phone, Mail, 
            CheckSquare, Shield, Key, FileBarChart
        } from 'lucide-react';

        // --- CẤU HÌNH DỮ LIỆU BAN ĐẦU ---
        const INITIAL_MEMBERS = [
            { id: 'm1', code: 'PN293', name: 'Founder PN293', role: 'Founder', status: 'active', createdAt: '2026-06-01' },
            { id: 'm2', code: 'PN121', name: 'Founder PN121', role: 'Founder', status: 'active', createdAt: '2026-06-01' }
        ];

        // --- UTILITIES ---
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {}
            };
            return [storedValue, setValue];
        }

        const getTodayStr = () => {
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            return (new Date(today - offset)).toISOString().slice(0, 10);
        };

        const formatDate = (dateString) => {
            if (!dateString) return '';
            const date = new Date(dateString);
            return `${date.getDate().toString().padStart(2, '0')}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getFullYear()}`;
        };

        const calculateTimelineStyle = (start, end, viewStart, viewEnd) => {
            const tStart = new Date(start).getTime();
            const tEnd = new Date(end).getTime();
            const vStart = new Date(viewStart).getTime();
            const vEnd = new Date(viewEnd).getTime();
            const totalDuration = vEnd - vStart;

            if (tEnd < vStart || tStart > vEnd) return { display: 'none' };
            const leftPercent = Math.max(0, ((tStart - vStart) / totalDuration) * 100);
            const rightPercent = Math.min(100, ((tEnd - vStart) / totalDuration) * 100);
            return { left: `${leftPercent}%`, width: `${rightPercent - leftPercent}%` };
        };

        // --- COMPONENTS UI DÙNG CHUNG ---
        const ConfirmDialog = ({ isOpen, title, message, confirmText = "Xác nhận", cancelText = "Hủy", onConfirm, onCancel, isDanger = false }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[200] flex items-center justify-center p-4 fade-in">
                    <div className="bg-slate-900 border border-slate-800 rounded-2xl max-w-sm w-full p-6 shadow-2xl">
                        <h3 className="text-xl font-bold text-slate-50 mb-2">{title}</h3>
                        <p className="text-slate-400 text-sm mb-6 leading-relaxed">{message}</p>
                        <div className="flex justify-end gap-3">
                            {cancelText && (
                                <button onClick={onCancel} className="px-4 py-2 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-50 hover:bg-slate-800 transition-colors">
                                    {cancelText}
                                </button>
                            )}
                            <button onClick={onConfirm} className={`px-4 py-2 rounded-xl text-sm font-medium text-white transition-all shadow-lg ${isDanger ? 'bg-rose-600 hover:bg-rose-500 shadow-rose-600/20' : 'bg-blue-600 hover:bg-blue-500 shadow-blue-600/20'}`}>
                                {confirmText}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Badge = ({ text, color = "blue", className="" }) => {
            const colorMap = {
                blue: "text-blue-400 bg-blue-500/10 border-blue-500/20",
                violet: "text-violet-400 bg-violet-500/10 border-violet-500/20",
                emerald: "text-emerald-400 bg-emerald-500/10 border-emerald-500/20",
                orange: "text-orange-400 bg-orange-500/10 border-orange-500/20",
                rose: "text-rose-400 bg-rose-500/10 border-rose-500/20",
                amber: "text-amber-400 bg-amber-500/10 border-amber-500/20",
                slate: "text-slate-400 bg-slate-800 border-slate-700",
            };
            return (
                <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border flex items-center w-max ${colorMap[color] || colorMap.blue} ${className}`}>
                    {text}
                </span>
            );
        };

        const ProgressBar = ({ progress, colorClass = "bg-blue-500", heightClass = "h-1.5" }) => (
            <div className={`w-full bg-slate-800 rounded-full overflow-hidden ${heightClass}`}>
                <div className={`h-full ${colorClass} transition-all duration-500 ease-out`} style={{ width: `${progress}%` }}></div>
            </div>
        );

        const FocusTimer = () => {
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [isRunning, setIsRunning] = useState(false);
            const timerRef = useRef(null);

            useEffect(() => {
                if (isRunning) {
                    timerRef.current = setInterval(() => {
                        setTimeLeft(prev => {
                            if (prev <= 1) { setIsRunning(false); clearInterval(timerRef.current); return 0; }
                            return prev - 1;
                        });
                    }, 1000);
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isRunning]);

            const toggleTimer = () => setIsRunning(!isRunning);
            const resetTimer = () => { setIsRunning(false); setTimeLeft(25 * 60); };
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;

            return (
                <div className="flex items-center gap-2 bg-slate-950 border border-slate-800 px-3 py-1.5 rounded-xl shadow-inner">
                    <Timer size={14} className={isRunning ? "text-emerald-400 animate-pulse" : "text-slate-400"} />
                    <span className="text-xs font-mono font-bold text-slate-300">
                        {minutes.toString().padStart(2, '0')}:{seconds.toString().padStart(2, '0')}
                    </span>
                    <button onClick={toggleTimer} className="p-0.5 text-slate-400 hover:text-white transition-colors">
                        {isRunning ? <Pause size={12} /> : <Play size={12} />}
                    </button>
                    <button onClick={resetTimer} className="p-0.5 text-slate-400 hover:text-rose-400 transition-colors">
                        <RotateCcw size={12} />
                    </button>
                </div>
            );
        };

        // --- VIEWS ỨNG DỤNG ---
        const LoginView = ({ onLogin, validMembers }) => {
            const [accessCode, setAccessCode] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setError('');
                const code = accessCode.trim().toUpperCase();
                const member = validMembers.find(m => m.code === code && m.status === 'active');
                
                if (member) onLogin({ username: code, name: member.name, level: member.role });
                else setError('Mã truy cập không hợp lệ hoặc đã bị vô hiệu hóa.');
            };

            return (
                <div className="min-h-[100dvh] flex items-center justify-center bg-slate-950 p-4 text-slate-50 font-sans relative overflow-hidden app-container">
                    <div className="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none"></div>
                    <div className="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-violet-600/10 rounded-full blur-[120px] pointer-events-none"></div>

                    <div className="max-w-md w-full bg-slate-900/80 backdrop-blur-2xl p-8 rounded-[2rem] border border-slate-800 shadow-2xl relative z-10 fade-in">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-gradient-to-br from-blue-500 to-violet-600 rounded-3xl mx-auto flex items-center justify-center mb-6 shadow-xl shadow-blue-500/20 transform rotate-3">
                                <Shield size={36} className="text-white transform -rotate-3" />
                            </div>
                            <h1 className="text-3xl font-black tracking-tight mb-2 text-transparent bg-clip-text bg-gradient-to-r from-slate-50 to-slate-400">Task PN</h1>
                            <p className="text-slate-400 text-sm font-medium">Hệ thống Lên Kế Hoạch & Quản lý</p>
                        </div>

                        {error && (
                            <div className="mb-6 bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm px-4 py-3 rounded-xl flex items-center gap-3">
                                <AlertCircle size={18} className="shrink-0" />
                                <p className="font-medium">{error}</p>
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-slate-300 mb-2">Mã Cấp Phép (Access Code)</label>
                                <div className="relative group">
                                    <Key className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-400 transition-colors" size={20} />
                                    <input type="text" required value={accessCode} onChange={(e) => setAccessCode(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl py-4 pl-12 pr-4 text-slate-50 font-mono tracking-[0.2em] uppercase focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600 placeholder:tracking-normal placeholder:normal-case text-lg shadow-inner" placeholder="Nhập mã PN293..." autoComplete="off"/>
                                </div>
                                <p className="text-[10px] text-slate-500 mt-3 text-center uppercase tracking-widest font-bold">Mã mặc định: PN293 hoặc PN121</p>
                            </div>
                            <button type="submit" className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all mt-4 shadow-lg shadow-blue-600/20 active:scale-95 flex justify-center items-center gap-2">
                                Truy cập hệ thống <ArrowRight size={18} />
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const DashboardView = ({ user, tasks, toggleTaskStatus, projects, setActiveTab, searchQuery }) => {
            const filteredTasks = tasks.filter(task => task.title.toLowerCase().includes(searchQuery.toLowerCase()));
            const activeTasks = filteredTasks.filter(t => t.status !== 'done');
            const completedTasks = tasks.filter(t => t.status === 'done').length;
            const totalTasks = tasks.length;
            const progress = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

            return (
                <div className="space-y-6 fade-in pb-20 md:pb-6">
                    <header className="flex flex-col md:flex-row md:justify-between md:items-end gap-4 mb-2">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-50 mb-1.5 tracking-tight">Tổng quan</h1>
                            <p className="text-slate-400 text-sm">Hôm nay là {formatDate(getTodayStr())}. Vai trò: <span className="font-bold text-blue-400">{user.level}</span>.</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-slate-900/50 backdrop-blur-md rounded-2xl border border-slate-800/80 p-6 flex flex-col min-h-[420px] shadow-lg">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <h2 className="text-lg font-bold text-slate-50">Nhiệm vụ cần làm</h2>
                                    <p className="text-sm text-slate-400 mt-1">Đã xong {completedTasks}/{totalTasks} công việc</p>
                                </div>
                                <button onClick={() => setActiveTab('board')} className="text-sm font-medium text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-1.5 bg-blue-500/10 px-4 py-2 rounded-lg border border-blue-500/20 active:scale-95">
                                    Mở Bảng Task <ArrowRight size={16}/>
                                </button>
                            </div>
                            
                            <div className="mb-6"><ProgressBar progress={progress} colorClass={progress === 100 && totalTasks > 0 ? "bg-emerald-500" : "bg-blue-500"} /></div>

                            <div className="space-y-3 flex-1 overflow-y-auto custom-scrollbar pr-2">
                                {totalTasks === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-500 py-10">
                                        <Layout size={48} className="mb-4 opacity-30" />
                                        <p className="text-sm font-bold text-slate-400">Bạn chưa tạo công việc nào.</p>
                                    </div>
                                ) : activeTasks.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-500 py-10">
                                        <CheckCircle2 size={48} className="mb-4 opacity-50 text-emerald-500" />
                                        <p className="text-sm font-bold text-slate-400">Không có task nào cần làm!</p>
                                    </div>
                                ) : (
                                    activeTasks.map(task => {
                                        const project = projects.find(p => p.id === task.projectId);
                                        const pColor = task.priority === 'high' ? 'rose' : task.priority === 'medium' ? 'amber' : 'slate';
                                        return (
                                            <div key={task.id} onClick={() => toggleTaskStatus(task.id, 'done')} className="flex items-center gap-4 p-4 rounded-xl border border-slate-800/80 hover:border-blue-500/50 bg-slate-900/40 cursor-pointer group transition-all active:scale-[0.98]">
                                                <button className="shrink-0 text-slate-500 group-hover:text-emerald-400 transition-colors"><Circle size={24} strokeWidth={2} /></button>
                                                <div className="flex-1 min-w-0 flex justify-between items-center">
                                                    <div>
                                                        <p className="text-sm font-bold text-slate-200 group-hover:text-blue-100 transition-colors truncate">{task.title}</p>
                                                        <div className="flex items-center gap-2 mt-1.5">
                                                            <Badge text={project ? project.name : 'Chung'} color={project ? project.color : 'slate'} className="text-[9px]" />
                                                            <span className="text-slate-400 text-xs flex items-center gap-1 font-medium"><CalendarIcon size={12}/> {formatDate(task.endDate)}</span>
                                                        </div>
                                                    </div>
                                                    <Badge text={task.priority === 'high' ? 'Gấp' : task.priority === 'medium' ? 'Vừa' : 'Thấp'} color={pColor} className="mb-1.5 justify-end" />
                                                </div>
                                            </div>
                                        )
                                    })
                                )}
                            </div>
                        </div>

                        <div className="bg-slate-900/50 backdrop-blur-md rounded-2xl border border-slate-800/80 p-6 flex flex-col gap-4 min-h-[420px] shadow-lg">
                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 mb-2"><Layout size={14}/> Tiến độ Dự án Hiện tại</h3>
                            <div className="space-y-6 flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                {projects.length === 0 ? (
                                    <div className="h-full flex flex-col items-center justify-center text-slate-500 py-10">
                                        <Briefcase size={48} className="mb-4 opacity-30" />
                                        <p className="text-sm font-bold text-slate-400">Chưa có dự án nào.</p>
                                    </div>
                                ) : (
                                    projects.map(p => {
                                        const pTasks = tasks.filter(t => t.projectId === p.id);
                                        const pDone = pTasks.filter(t => t.status === 'done').length;
                                        const pProg = pTasks.length ? Math.round((pDone/pTasks.length)*100) : 0;
                                        return (
                                            <div key={p.id} className="bg-slate-900/40 p-4 rounded-xl border border-slate-800/50">
                                                <div className="flex justify-between items-center mb-3">
                                                    <div>
                                                        <p className="text-sm font-bold text-slate-200 truncate pr-2">{p.name}</p>
                                                        <p className="text-[10px] text-slate-500 mt-1 uppercase tracking-wider font-mono">{formatDate(p.startDate)} - {formatDate(p.endDate)}</p>
                                                    </div>
                                                    <span className={`text-sm font-black ${pProg === 100 ? 'text-emerald-400' : 'text-blue-400'}`}>{pProg}%</span>
                                                </div>
                                                <ProgressBar progress={pProg} colorClass={`bg-${p.color}-500`} heightClass="h-2" />
                                            </div>
                                        )
                                    })
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TimelineView = ({ projects, tasks, setProjects, setTasks, searchQuery, triggerAlert, triggerConfirm }) => {
            const [viewMode, setViewMode] = useState('calendar'); 
            const [currentCalMonth, setCurrentCalMonth] = useState(() => {
                const today = new Date();
                return new Date(today.getFullYear(), today.getMonth(), 1);
            }); 
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingProject, setEditingProject] = useState(null);
            const [expandedProjects, setExpandedProjects] = useState(projects.map(p => p.id)); 
            const [selectedDayInfo, setSelectedDayInfo] = useState(null);

            const initialForm = { name: '', client: '', startDate: getTodayStr(), endDate: getTodayStr(), status: 'planning', color: 'blue' };
            const [formData, setFormData] = useState(initialForm);

            const filteredProjects = useMemo(() => projects.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase())), [projects, searchQuery]);

            const today = new Date();
            const viewStart = new Date(today.getFullYear(), today.getMonth() - 1, 1); 
            const viewEnd = new Date(today.getFullYear(), today.getMonth() + 4, 0); 
            const months = [];
            let currentMonth = new Date(viewStart);
            while (currentMonth <= viewEnd) { months.push(new Date(currentMonth)); currentMonth.setMonth(currentMonth.getMonth() + 1); }

            const nextMonth = () => setCurrentCalMonth(new Date(currentCalMonth.getFullYear(), currentCalMonth.getMonth() + 1, 1));
            const prevMonth = () => setCurrentCalMonth(new Date(currentCalMonth.getFullYear(), currentCalMonth.getMonth() - 1, 1));

            const calYear = currentCalMonth.getFullYear();
            const calMonth = currentCalMonth.getMonth();
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const firstDayOfWeek = new Date(calYear, calMonth, 1).getDay();
            const blanksCount = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1; 
            const blanks = Array.from({length: blanksCount}, (_, i) => i);
            const calendarDays = Array.from({length: daysInMonth}, (_, i) => new Date(calYear, calMonth, i + 1));

            const toggleExpand = (id) => setExpandedProjects(prev => prev.includes(id) ? prev.filter(pId => pId !== id) : [...prev, id]);
            const handleOpenCreate = () => { setEditingProject(null); setFormData(initialForm); setIsModalOpen(true); };
            const handleOpenEdit = (project, e) => { e.stopPropagation(); setEditingProject(project); setFormData(project); setIsModalOpen(true); };
            
            const handleOpenDelete = (project, e) => { 
                e.stopPropagation(); 
                triggerConfirm("Xóa Dự Án", `Bạn có chắc chắn muốn xóa dự án "${project.name}" cùng tất cả các đầu việc liên quan?`, () => {
                    setProjects(prev => prev.filter(p => p.id !== project.id));
                    setTasks(prev => prev.filter(t => t.projectId !== project.id));
                }, true);
            };

            const handleSaveProject = (e) => {
                e.preventDefault();
                if (new Date(formData.startDate) > new Date(formData.endDate)) { triggerAlert("Lỗi", "Ngày bắt đầu không được lớn hơn ngày kết thúc!"); return; }
                if (editingProject) setProjects(prev => prev.map(p => p.id === editingProject.id ? { ...p, ...formData } : p));
                else setProjects(prev => [...prev, { ...formData, id: 'p_' + Date.now() }]);
                setIsModalOpen(false);
            };

            return (
                <div className="flex flex-col h-full fade-in relative pb-20 md:pb-0">
                    <div className="flex flex-col sm:flex-row justify-between sm:items-end gap-4 mb-6 shrink-0 z-10">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-50 mb-2 tracking-tight">Timeline PiEn</h1>
                            <p className="text-slate-400 text-sm">Quản lý lịch trình dự án chuyên nghiệp.</p>
                        </div>
                        <div className="flex flex-wrap items-center gap-3">
                            <div className="bg-slate-900 border border-slate-800 rounded-xl p-1 flex shadow-sm">
                                <button onClick={() => setViewMode('calendar')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${viewMode === 'calendar' ? 'bg-slate-800 text-slate-50 shadow-md' : 'text-slate-500'}`}>Block</button>
                                <button onClick={() => setViewMode('details')} className={`px-4 py-2 rounded-lg text-sm font-bold transition-all ${viewMode === 'details' ? 'bg-slate-800 text-slate-50 shadow-md' : 'text-slate-500'}`}>Gantt</button>
                            </div>
                            <button onClick={handleOpenCreate} className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2.5 rounded-xl text-sm font-bold transition-colors shadow-lg shadow-blue-600/20 flex items-center gap-2 active:scale-95">
                                <Plus size={16}/> Tạo Dự án
                            </button>
                        </div>
                    </div>

                    {viewMode === 'calendar' && (
                        <div className="flex-1 overflow-y-auto custom-scrollbar pb-6 fade-in">
                            <div className="bg-slate-900/50 backdrop-blur-md rounded-2xl border border-slate-800/80 p-4 md:p-6 shadow-lg">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 pb-4 border-b border-slate-800 gap-4">
                                    <h2 className="text-lg md:text-xl font-bold text-slate-50 flex items-center gap-3">
                                        <CalendarIcon size={20} className="text-blue-400"/>

            const [draggedTask, setDraggedTask] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [filterProject, setFilterProject] = useState('all');

            const initialFormState = { title: '', projectId: projects[0]?.id || '', startDate: getTodayStr(), endDate: getTodayStr(), status: 'todo', priority: 'medium' };
            const [formData, setFormData] = useState(initialFormState);

            const onDragStart = (e, task) => { setDraggedTask(task); e.dataTransfer.effectAllowed = 'move'; };
            const onDragOver = (e) => e.preventDefault();
            const onDrop = (e, targetStatus) => {
                e.preventDefault();
                if (!draggedTask || draggedTask.status === targetStatus) return;
                setTasks(prev => prev.map(t => t.id === draggedTask.id ? { ...t, status: targetStatus } : t));
                setDraggedTask(null);
            };

            const handleSaveTask = (e) => {
                e.preventDefault();
                if (new Date(formData.startDate) > new Date(formData.endDate)) { triggerAlert("Lỗi", "Ngày bắt đầu > Deadline!"); return; }
                if (editingTask) setTasks(prev => prev.map(t => t.id === editingTask.id ? { ...t, ...formData } : t));
                else setTasks(prev => [...prev, { ...formData, id: 't_' + Date.now() }]);
                setIsModalOpen(false);
            };

            const openModal = (task = null) => {
                if (projects.length === 0) { triggerAlert("Thiếu thông tin", "Cần tạo Dự Án trước!"); return; }
                if (task) { setEditingTask(task); setFormData(task); } 
                else { setEditingTask(null); setFormData({ ...initialFormState, projectId: filterProject !== 'all' ? filterProject : (projects[0]?.id || '') }); }
                setIsModalOpen(true);
            };

            const handleDeleteTask = (task) => {
                triggerConfirm("Xóa Task", "Bạn có chắc chắn muốn xóa?", () => { setTasks(prev => prev.filter(t => t.id !== task.id)); setIsModalOpen(false); }, true);
            };

            const columns = [ { id: 'todo', title: 'CẦN LÀM', dot: 'bg-slate-500' }, { id: 'in-progress', title: 'ĐANG LÀM', dot: 'bg-blue-500' }, { id: 'done', title: 'ĐÃ XONG', dot: 'bg-emerald-500' } ];
            const filteredTasks = useMemo(() => tasks.filter(t => (filterProject === 'all' || t.projectId === filterProject) && t.title.toLowerCase().includes(searchQuery.toLowerCase())), [tasks, filterProject, searchQuery]);

            return (
                <div className="flex flex-col h-full fade-in pb-20 md:pb-0">
                    <div className="flex flex-col sm:flex-row justify-between sm:items-end gap-4 mb-4 shrink-0">

                                <option value="all">Tất cả dự án</option>
                                {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>
                        </div>
                        <button onClick={() => openModal()} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 justify-center active:scale-95"><Plus size={16} /> Thêm Task</button>
                    </div>

                    <div className="flex gap-4 flex-1 min-h-0 overflow-x-auto pb-4 custom-scrollbar snap-x">
                        {columns.map(col => (
                            <div key={col.id} onDragOver={onDragOver} onDrop={(e) => onDrop(e, col.id)} className="flex-1 min-w-[280px] max-w-[350px] bg-slate-900/40 rounded-2xl border border-slate-800 flex flex-col snap-center">
                                <div className="p-3 border-b border-slate-800 flex justify-between items-center shrink-0">
                                    <h3 className="font-bold text-slate-300 text-xs flex items-center gap-2"><span className={`w-2 h-2 rounded-full ${col.dot}`}></span> {col.title}</h3>
                                    <span className="text-xs font-bold text-slate-500">{filteredTasks.filter(t => t.status === col.id).length}</span>
                                </div>
                                <div className="p-3 space-y-2.5 flex-1 overflow-y-auto custom-scrollbar">
                                    {filteredTasks.filter(t => t.status === col.id).map(task => {
                                        const project = projects.find(p => p.id === task.projectId);
                                        return (
                                            <div key={task.id} draggable onDragStart={(e) => onDragStart(e, task)} onClick={() => openModal(task)} className={`bg-slate-800 border border-slate-700 p-3 rounded-xl cursor-grab active:cursor-grabbing hover:border-blue-500/50 ${col.id === 'done' ? 'opacity-50' : ''}`}>
                                                <Badge text={project ? project.name : 'N/A'} color={project ? project.color : 'slate'} className="mb-2" />
                                                <h4 className={`text-xs font-semibold mb-2 ${col.id === 'done' ? 'line-through text-slate-500' : 'text-slate-100'}`}>{task.title}</h4>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ))}
                    </div>

                                </div>
                                <form onSubmit={handleSaveTask} className="space-y-4">
                                    <input required type="text" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-50 outline-none" placeholder="Tên công việc" />

                                        {projects.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}

                                        <input required type="date" value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-400 outline-none [color-scheme:dark]" />
                                    </div>

                                        {editingTask ? <button type="button" onClick={() => handleDeleteTask(editingTask)} className="text-rose-400 text-sm font-bold">Xóa</button> : <div/>}

                                            <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 text-sm font-bold text-slate-400 bg-slate-800 rounded-xl">Hủy</button>
                                            <button type="submit" className="px-4 py-2 text-sm font-bold text-white bg-blue-600 rounded-xl">Lưu</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

                    {/* Modal Thêm Khách */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[150] flex items-center justify-center p-4">
                            <div className="bg-slate-900 rounded-2xl w-full max-w-sm border border-slate-800 p-6">
                                <h2 className="text-lg font-bold text-slate-50 mb-4">{editingClient ? 'Sửa thông tin' : 'Thêm Khách'}</h2>
                                <form onSubmit={handleSave} className="space-y-3">
                                    <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} placeholder="Tên" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-50 outline-none" />
                                    <input type="text" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} placeholder="SĐT" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-50 outline-none" />
                                    <input type="text" value={formData.company} onChange={e => setFormData({...formData, company: e.target.value})} placeholder="Công ty" className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-50 outline-none" />
                                    <div className="flex justify-end gap-2 pt-4">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 bg-slate-800 rounded-xl text-sm font-bold text-slate-400">Hủy</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 rounded-xl text-sm font-bold text-white">Lưu</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            )
        };

        const ReportView = ({ projects, tasks }) => {
            const [startDate, setStartDate] = useState(getTodayStr());
            const [endDate, setEndDate] = useState(getTodayStr());

            const printReport = () => {
                const printContent = document.getElementById('report-content').innerHTML;
                const originalContent = document.body.innerHTML;
                document.body.innerHTML = printContent;
                window.print();
                document.body.innerHTML = originalContent;
                window.location.reload(); // Reload after print to restore event listeners
            };

            const sDate = new Date(startDate).getTime();
            const eDate = new Date(endDate).getTime();
            const validProjects = projects.filter(p => new Date(p.endDate).getTime() >= sDate && new Date(p.startDate).getTime() <= eDate);
            const validTasks = tasks.filter(t => new Date(t.endDate).getTime() >= sDate && new Date(t.startDate).getTime() <= eDate);

            return (
                <div className="flex flex-col h-full fade-in pb-20 md:pb-0">
                    <h1 className="text-3xl font-bold text-slate-50 tracking-tight mb-6">Báo cáo & Xuất file</h1>
                    <div className="flex flex-col md:flex-row gap-6 flex-1 min-h-0">
                        {/* Cột Option */}
                        <div className="w-full md:w-64 bg-slate-900/50 p-4 rounded-2xl border border-slate-800 flex flex-col gap-4">
                            <div>
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Từ ngày</label>
                                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-sm text-slate-300 [color-scheme:dark]"/>
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 block">Đến ngày</label>
                                <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-sm text-slate-300 [color-scheme:dark]"/>
                            </div>
                            <button onClick={printReport} className="mt-auto bg-blue-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-transform"><Printer size={16}/> In Báo Cáo</button>
                        </div>
                        
                        {/* Cột Preview */}
                        <div className="flex-1 bg-white rounded-2xl p-6 md:p-10 overflow-y-auto custom-scrollbar text-black shadow-inner relative" id="report-content">
                            <div className="text-center mb-8 border-b-2 border-slate-200 pb-4">
                                <h1 className="text-2xl font-black uppercase tracking-wider">Báo Cáo Tiến Độ</h1>
                                <p className="text-sm font-medium text-slate-600 mt-1">Giai đoạn: {formatDate(startDate)} - {formatDate(endDate)}</p>
                            </div>
                            
                            {validProjects.length === 0 ? <p className="text-center text-slate-400 italic">Không có dữ liệu trong khoảng thời gian này.</p> : (
                                validProjects.map(p => {
                                    const pTasks = validTasks.filter(t => t.projectId === p.id);
                                    return (
                                        <div key={p.id} className="mb-6 pb-6 border-b border-dashed border-slate-300 last:border-0">
                                            <h2 className="text-lg font-bold text-blue-700 flex justify-between items-center">
                                                {p.name} <span className="text-xs bg-slate-100 text-slate-600 px-2 py-1 rounded border border-slate-200">{formatDate(p.startDate)} - {formatDate(p.endDate)}</span>
                                            </h2>
                                            <div className="mt-3 space-y-2 pl-4 border-l-2 border-blue-200">
                                                {pTasks.length === 0 ? <p className="text-xs italic text-slate-400">Không có công việc nào.</p> : (
                                                    pTasks.map(t => (
                                                        <div key={t.id} className="flex justify-between items-center text-sm">
                                                            <div className="flex items-center gap-2">
                                                                {t.status === 'done' ? <span className="text-emerald-600 font-bold">✓</span> : <span className="text-slate-400">•</span>}
                                                                <span className={t.status === 'done' ? 'line-through text-slate-500' : 'text-slate-800'}>{t.title}</span>
                                                            </div>
                                                            <span className="text-xs text-slate-500">{formatDate(t.endDate)}</span>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    )
                                })
                            )}
                        </div>
                    </div>
                    <style dangerouslySetInnerHTML={{__html: `
                        @media print {
                            body * { visibility: hidden; }
                            #report-content, #report-content * { visibility: visible; }
                            #report-content { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; padding: 0; }
                        }
                    `}} />
                </div>
            );
        };

        const TeamView = ({ members, isFounder, setMembers, triggerAlert, triggerConfirm }) => {
            const createNewCode = () => {
                if (!isFounder) return triggerAlert("Từ chối", "Chỉ Founder mới có quyền tạo mã.");
                const newCode = 'PN' + Math.floor(100 + Math.random() * 900);
                setMembers(prev => [...prev, { id: 'm_'+Date.now(), code: newCode, name: 'Thành viên mới', role: 'Thành viên', status: 'active', createdAt: getTodayStr() }]);
                triggerAlert("Thành công", `Đã tạo mã truy cập mới: ${newCode}`);
            };

            const removeMember = (id) => {
                if (!isFounder) return triggerAlert("Từ chối", "Không có quyền thực hiện.");
                triggerConfirm("Vô hiệu hóa", "Thành viên này sẽ không thể đăng nhập nữa?", () => {
                    setMembers(prev => prev.map(m => m.id === id ? {...m, status: 'inactive'} : m));
                }, true);
            };

            return (
                <div className="flex flex-col h-full fade-in pb-20 md:pb-0">
                    <div className="flex justify-between items-end mb-6 shrink-0">
                        <h1 className="text-3xl font-bold text-slate-50 tracking-tight">Đội ngũ</h1>
                        {isFounder && <button onClick={createNewCode} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold active:scale-95 transition-transform">+ Tạo Mã Mới</button>}
                    </div>
                    <div className="space-y-3">
                        {members.map(m => (
                            <div key={m.id} className={`bg-slate-900/50 p-4 rounded-2xl border border-slate-800 flex justify-between items-center ${m.status === 'inactive' ? 'opacity-50' : ''}`}>
                                <div><p className="font-bold text-slate-200 text-sm">{m.name} <span className="text-slate-500 font-normal ml-2">({m.code})</span></p><p className="text-xs text-slate-500 mt-0.5">Vai trò: {m.role} | Tạo: {formatDate(m.createdAt)}</p></div>
                                <div className="flex items-center gap-3">
                                    <Badge text={m.status} color={m.status === 'active' ? 'emerald' : 'rose'} />
                                    {isFounder && m.role !== 'Founder' && m.status === 'active' && <button onClick={() => removeMember(m.id)} className="text-rose-400 p-1"><X size={16}/></button>}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            )
        }

        function App() {
            const [members, setMembers] = useLocalStorage('taskpn_members_app', INITIAL_MEMBERS);
            const [user, setUser] = useLocalStorage('taskpn_user_app', null);
            const [activeTab, setActiveTab] = useState('dashboard');
            
            const [projects, setProjects] = useLocalStorage('taskpn_projects_app', []);
            const [tasks, setTasks] = useLocalStorage('taskpn_tasks_app', []);
            const [clients, setClients] = useLocalStorage('taskpn_clients_app', []);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            const [alertConfig, setAlertConfig] = useState({ isOpen: false, title: '', message: '' });
            const [confirmConfig, setConfirmConfig] = useState({ isOpen: false, title: '', message: '', onConfirm: () => {}, isDanger: false, cancelText: "Hủy" });

            const triggerAlert = (title, message) => setAlertConfig({ isOpen: true, title, message });
            const triggerConfirm = (title, message, onConfirm, isDanger = false, cancelText = "Hủy") => {
                setConfirmConfig({ isOpen: true, title, message, onConfirm: () => { onConfirm(); setConfirmConfig(prev => ({ ...prev, isOpen: false })); }, isDanger, cancelText });
            };

            const handleLogin = (userData) => setUser(userData);
            const toggleTaskStatus = (taskId, status) => setTasks(prev => prev.map(t => t.id === taskId ? { ...t, status } : t));

            if (!user) return <LoginView onLogin={handleLogin} validMembers={members} />;
            const isFounder = user.level === 'Founder';

            const NavItem = ({ icon: Icon, label, id }) => (
                <button onClick={() => { setActiveTab(id); setSearchQuery(''); setIsSidebarOpen(false); }} className={`w-full flex items-center gap-3 px-4 py-3 md:py-3.5 rounded-xl transition-all text-sm font-medium ${activeTab === id ? 'bg-blue-600 text-white font-bold shadow-lg shadow-blue-500/20' : 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200'}`}>
                    <Icon size={20} className={activeTab === id ? 'text-white' : 'opacity-70'} /> 
                    <span className="hidden md:inline">{label}</span>
                </button>
            );

            // Bottom Navigation cho Mobile
            const MobileNav = () => (
                <div className="md:hidden fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 flex justify-around p-2 z-50 pb-safe">
                    <button onClick={() => setActiveTab('dashboard')} className={`p-3 rounded-xl flex flex-col items-center gap-1 ${activeTab === 'dashboard' ? 'text-blue-400' : 'text-slate-500'}`}><Home size={20}/> <span className="text-[9px] font-bold">Home</span></button>
                    <button onClick={() => setActiveTab('timeline')} className={`p-3 rounded-xl flex flex-col items-center gap-1 ${activeTab === 'timeline' ? 'text-blue-400' : 'text-slate-500'}`}><CalendarDays size={20}/> <span className="text-[9px] font-bold">Lịch</span></button>
                    <button onClick={() => setActiveTab('board')} className={`p-3 rounded-xl flex flex-col items-center gap-1 ${activeTab === 'board' ? 'text-blue-400' : 'text-slate-500'}`}><Layout size={20}/> <span className="text-[9px] font-bold">Task</span></button>
                    <button onClick={() => setIsSidebarOpen(true)} className={`p-3 rounded-xl flex flex-col items-center gap-1 text-slate-500`}><Users size={20}/> <span className="text-[9px] font-bold">Menu</span></button>
                </div>
            );

            return (
                <div className="flex h-[100dvh] bg-slate-950 text-slate-50 font-sans overflow-hidden app-container">
                    {/* Overlay Mobile Menu */}
                    {isSidebarOpen && <div className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm" onClick={() => setIsSidebarOpen(false)}/>}

                    {/* Sidebar / Menu trượt */}
                    <aside className={`fixed md:static inset-y-0 right-0 md:left-0 w-64 md:w-64 bg-slate-900 border-l md:border-r border-slate-800 flex flex-col z-50 transform transition-transform duration-300 ${isSidebarOpen ? 'translate-x-0' : 'translate-x-full md:translate-x-0'}`}>
                        <div className="h-16 flex items-center px-4 border-b border-slate-800 shrink-0 justify-between">
                            <div className="flex items-center gap-2 font-black text-lg tracking-tight">
                                <div className="bg-blue-600 p-2 rounded-lg"><Shield size={16} className="text-white" /></div> Task PN
                            </div>
                            <button className="md:hidden p-2 text-slate-400" onClick={() => setIsSidebarOpen(false)}><X size={20} /></button>
                        </div>

                        <nav className="flex-1 px-3 py-4 flex flex-col gap-1 overflow-y-auto custom-scrollbar">
                            <div className="md:block hidden">
                                <NavItem icon={Home} label="Dashboard" id="dashboard" />
                                <NavItem icon={CalendarDays} label="Timeline PiEn" id="timeline" />
                                <NavItem icon={Layout} label="Bảng Task" id="board" />
                            </div>
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-3 mt-4 mb-1">Quản lý</p>
                            <NavItem icon={Users} label="Khách hàng" id="crm" />
                            <NavItem icon={FileBarChart} label="Báo cáo" id="reports" />
                            <NavItem icon={Key} label="Đội ngũ" id="team" />
                        </nav>

                        <div className="p-3 border-t border-slate-800 bg-slate-900 shrink-0 mb-safe">
                            <div className="flex items-center justify-between px-3 py-2 bg-slate-800 rounded-xl border border-slate-700">
                                <div className="flex items-center gap-2 min-w-0">
                                    <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-[10px] font-bold shrink-0">{user.username.replace('PN', '')}</div>
                                    <div className="min-w-0"><p className="text-xs font-bold truncate text-slate-200">{user.name}</p></div>
                                </div>
                                <button onClick={() => triggerConfirm("Đăng xuất", "Thoát hệ thống?", () => setUser(null), true)} className="text-slate-500 p-1"><LogOut size={14} /></button>
                            </div>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col h-[100dvh] overflow-hidden bg-slate-950 relative">
                        {/* Header */}
                        <header className="h-14 md:h-16 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md flex items-center justify-between px-4 shrink-0 z-10 sticky top-0">
                            <div className="relative w-full max-w-xs md:max-w-md">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" size={16} />
                                <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Tìm kiếm..." className="w-full bg-slate-950 border border-slate-800 rounded-full py-2 pl-10 pr-4 text-sm text-slate-50 outline-none" />
                            </div>
                            <div className="hidden md:block ml-auto"><FocusTimer /></div>
                        </header>

                        {/* Nội dung chính */}
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar relative">
                            <div className="max-w-[1200px] mx-auto h-full w-full">
                                {activeTab === 'dashboard' && <DashboardView user={user} tasks={tasks} toggleTaskStatus={toggleTaskStatus} projects={projects} setActiveTab={setActiveTab} searchQuery={searchQuery}/>}
                                {activeTab === 'timeline' && <TimelineView projects={projects} tasks={tasks} setProjects={setProjects} setTasks={setTasks} searchQuery={searchQuery} triggerAlert={triggerAlert} triggerConfirm={triggerConfirm}/>}
                                {activeTab === 'board' && <KanbanView projects={projects} tasks={tasks} setTasks={setTasks} searchQuery={searchQuery} triggerAlert={triggerAlert} triggerConfirm={triggerConfirm}/>}
                                {activeTab === 'crm' && <ClientCRMView clients={clients} setClients={setClients} searchQuery={searchQuery} triggerConfirm={triggerConfirm}/>}
                                {activeTab === 'reports' && <ReportView projects={projects} tasks={tasks} />}
                                {activeTab === 'team' && <TeamView members={members} isFounder={isFounder} setMembers={setMembers} triggerAlert={triggerAlert} triggerConfirm={triggerConfirm}/>}
                            </div>
                        </div>
                    </main>

                    <MobileNav />

                    <ConfirmDialog isOpen={alertConfig.isOpen} title={alertConfig.title} message={alertConfig.message} confirmText="Đồng ý" cancelText="" onConfirm={() => setAlertConfig(prev => ({ ...prev, isOpen: false }))} onCancel={() => setAlertConfig(prev => ({ ...prev, isOpen: false }))} />
                    <ConfirmDialog isOpen={confirmConfig.isOpen} title={confirmConfig.title} message={confirmConfig.message} confirmText="Xác nhận" cancelText={confirmConfig.cancelText} onConfirm={confirmConfig.onConfirm} onCancel={() => setConfirmConfig(prev => ({ ...prev, isOpen: false }))} isDanger={confirmConfig.isDanger}/>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
